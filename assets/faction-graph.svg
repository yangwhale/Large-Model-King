<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Noto Sans SC', 'PingFang SC', system-ui, sans-serif">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Connection lines -->
  <g stroke="url(#gold)" stroke-width="1.5" opacity="0.4" fill="none">
    <!-- Google to others -->
    <line x1="600" y1="140" x2="280" y2="280"/>
    <line x1="600" y1="140" x2="920" y2="280"/>
    <line x1="600" y1="140" x2="150" y2="480"/>
    <line x1="600" y1="140" x2="600" y2="480"/>
    <line x1="600" y1="140" x2="1050" y2="480"/>
    <!-- Supply lines (dashed) -->
    <line x1="150" y1="480" x2="280" y2="280" stroke-dasharray="8,4" opacity="0.3"/>
    <line x1="150" y1="480" x2="920" y2="280" stroke-dasharray="8,4" opacity="0.3"/>
    <!-- Hinton to Ilya -->
    <line x1="380" y1="680" x2="280" y2="340" opacity="0.3"/>
    <!-- People flow -->
    <path d="M 320 320 Q 400 400 600 480" stroke-dasharray="4,4" opacity="0.25"/>
    <path d="M 880 320 Q 800 400 600 480" stroke-dasharray="4,4" opacity="0.25"/>
  </g>

  <!-- Google 神殿 (top center - 万法之源) -->
  <g transform="translate(600,100)">
    <rect x="-140" y="-40" width="280" height="80" rx="12" fill="#2d8a56" stroke="#55efc4" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-50" text-anchor="middle" fill="#FFD700" font-size="16" font-weight="bold" filter="url(#glow)">万 法 之 源</text>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="18" font-weight="bold">🏛️ Google 神殿</text>
    <text x="0" y="18" text-anchor="middle" fill="#a0f0c0" font-size="12">Transformer · TPU · AlphaGo</text>
    <text x="0" y="33" text-anchor="middle" fill="#a0f0c0" font-size="12">AlphaFold · 双诺贝尔</text>
  </g>

  <!-- OpenAI 仙宗 (left) -->
  <g transform="translate(280,300)">
    <rect x="-120" y="-35" width="240" height="70" rx="10" fill="#2a5cb8" stroke="#74b9ff" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🐉 OpenAI 仙宗</text>
    <text x="0" y="15" text-anchor="middle" fill="#a0c8ff" font-size="11">GPT · ChatGPT · o1 · Sora</text>
    <text x="0" y="28" text-anchor="middle" fill="#ffd700" font-size="10">用 Google 的法典打天下</text>
  </g>

  <!-- Anthropic 正道盟 (right) -->
  <g transform="translate(920,300)">
    <rect x="-120" y="-35" width="240" height="70" rx="10" fill="#a0365a" stroke="#fd79a8" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🪷 Anthropic 正道盟</text>
    <text x="0" y="15" text-anchor="middle" fill="#ffc0d0" font-size="11">Claude · Constitutional AI</text>
    <text x="0" y="28" text-anchor="middle" fill="#ffc0d0" font-size="10">安全之道</text>
  </g>

  <!-- NVIDIA 灵核教廷 (far left) -->
  <g transform="translate(150,480)">
    <rect x="-120" y="-35" width="240" height="70" rx="10" fill="#1a6b50" stroke="#00b894" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">💎 灵核教廷</text>
    <text x="0" y="15" text-anchor="middle" fill="#80e8c0" font-size="11">NVIDIA · CUDA · H100 · B200</text>
    <text x="0" y="28" text-anchor="middle" fill="#ffd700" font-size="10">卖空气给所有人</text>
  </g>

  <!-- 东方六小龙 (center) -->
  <g transform="translate(600,480)">
    <rect x="-140" y="-35" width="280" height="70" rx="10" fill="#a04020" stroke="#e17055" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🔥 东方六小龙</text>
    <text x="0" y="15" text-anchor="middle" fill="#ffb090" font-size="11">DeepSeek · Kimi · 智谱 · MiniMax · 百川 · 阶跃</text>
    <text x="0" y="28" text-anchor="middle" fill="#ffd700" font-size="10">用更少灵核训出比肩的神兽</text>
  </g>

  <!-- 云霄三圣 (far right) -->
  <g transform="translate(1050,480)">
    <rect x="-120" y="-35" width="240" height="70" rx="10" fill="#4a30a0" stroke="#6c5ce7" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">☁️ 云霄三圣</text>
    <text x="0" y="15" text-anchor="middle" fill="#c0b0ff" font-size="11">AWS · Azure · Google Cloud</text>
    <text x="0" y="28" text-anchor="middle" fill="#c0b0ff" font-size="10">灵脉与灵石的控制者</text>
  </g>

  <!-- Meta 圣教 (left bottom) -->
  <g transform="translate(150,650)">
    <rect x="-110" y="-30" width="220" height="60" rx="10" fill="#1a50a0" stroke="#0984e3" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-3" text-anchor="middle" fill="white" font-size="15" font-weight="bold">🛡️ Meta 圣教</text>
    <text x="0" y="16" text-anchor="middle" fill="#80b0ff" font-size="11">Llama · PyTorch · 映身散天下</text>
  </g>

  <!-- 上古三巨头 (center bottom) -->
  <g transform="translate(480,680)">
    <rect x="-130" y="-30" width="260" height="60" rx="10" fill="#6a2080" stroke="#b060d0" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-3" text-anchor="middle" fill="white" font-size="15" font-weight="bold">👑 上古三巨头</text>
    <text x="0" y="16" text-anchor="middle" fill="#e0c0ff" font-size="11">Hinton · LeCun · Bengio · 双诺贝尔</text>
  </g>

  <!-- 大厂军团 + 游侠 (right bottom) -->
  <g transform="translate(850,650)">
    <rect x="-130" y="-30" width="260" height="60" rx="10" fill="#8a6a10" stroke="#fdcb6e" stroke-width="2" opacity="0.9"/>
    <text x="0" y="-3" text-anchor="middle" fill="white" font-size="15" font-weight="bold">⚔️ 大厂军团 · 游侠</text>
    <text x="0" y="16" text-anchor="middle" fill="#ffe090" font-size="11">Qwen · 混元 · Seed · Musk · Karpathy</text>
  </g>

  <!-- Key relationship labels -->
  <g fill="#FFD700" font-size="10" opacity="0.7">
    <text x="420" y="200" text-anchor="middle" transform="rotate(-25,420,200)">发明 Transformer</text>
    <text x="780" y="200" text-anchor="middle" transform="rotate(25,780,200)">出走创 Anthropic</text>
    <text x="180" y="390" text-anchor="middle" transform="rotate(-50,180,390)">供应灵核</text>
    <text x="600" y="320" text-anchor="middle">Gemini · JAX · TPU</text>
  </g>

  <!-- Title -->
  <text x="600" y="780" text-anchor="middle" fill="#666" font-size="11">《大模王》修仙界势力图谱 · 2026</text>
</svg>
