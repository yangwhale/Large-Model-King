  <!-- Tri Dao: FlashAttention 支撑一切 -->
  <line x1="1000" y1="370" x2="760" y2="490" stroke="#fdcb6e" stroke-width="1" stroke-dasharray="2,4" opacity="0.5"/>
  <line x1="1000" y1="360" x2="240" y2="350" stroke="#fdcb6e" stroke-width="1" stroke-dasharray="2,4" opacity="0.3"/>
  <text x="1050" y="400" text-anchor="middle" fill="#fdcb6e" font-size="9">FlashAttn</text>
